<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hermes</title>
  <link rel="stylesheet" href="styles.css?v=6">
</head>
<body>
  <div id="app">
    <!-- 内容区 -->
    <div id="content-area">
      <!-- 主内容区 -->
      <main id="main-content">
        <!-- 顶部工具栏 -->
        <header id="toolbar">
          <div class="toolbar-left">
            <div id="current-model" class="model-selector">
              <span class="model-name">加载中...</span>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
            <span class="toolbar-sep"></span>
            <div id="toolbar-tabs" class="toolbar-tabs">
              <button id="btn-history" class="btn-history" title="历史会话" onclick="toggleHistoryDropdown(event)">
                <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
              </button>
              <div id="history-dropdown" class="history-dropdown hidden"></div>
              <div class="tab active" data-index="0" onclick="switchTab(0)"><span class="tab-name">新对话</span></div>
              <button id="btn-new-tab" class="btn-new-tab" title="新建对话">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              </button>
            </div>
          </div>
          <div class="toolbar-right">
            <!-- 连接状态：旋转按钮→文字→呼吸灯 -->
            <div id="connection-status" class="status-indicator offline" style="position:relative;">
              <button id="btn-reconnect" class="btn-reconnect" title="刷新连接">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
              </button>
              <span class="status-text">未连接</span>
              <span class="status-dot"></span>
              <div id="toolbar-toast" class="toolbar-toast"></div>
            </div>
            <button id="btn-settings" class="btn-icon" title="控制面板">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            </button>
          </div>
        </header>

        <!-- 模型选择弹窗 -->
        <div id="model-modal" class="modal hidden">
          <div id="modal-content" class="modal-content"></div>
        </div>
        <!-- 文件查看器模态框 -->
        <div id="file-viewer" class="modal hidden">
          <div class="modal-content file-viewer-content">
            <div class="modal-header">
              <h3 id="file-viewer-title">文件查看</h3>
              <button class="btn-close" onclick="closeFileViewer()">&times;</button>
            </div>
            <div class="modal-body file-viewer-body">
              <div id="file-viewer-content"></div>
            </div>
          </div>
        </div>

        <!-- 设置面板 -->
        <div id="settings-panel" class="settings-panel hidden">
          <div class="settings-header">
            <div class="settings-tabs">
              <button class="settings-tab active" onclick="switchSettingsTab('dashboard')">控制面板</button>
              <button class="settings-tab" onclick="switchSettingsTab('platforms')">通信平台</button>
            </div>
            <button class="btn-close" onclick="closeSettings()">&times;</button>
          </div>
          <div id="settings-dashboard" class="settings-content">
            <div class="dashboard-wrap">
              <iframe id="dashboard-frame" class="dashboard-frame" src="about:blank"></iframe>
            </div>
          </div>
          <div id="settings-platforms" class="settings-content hidden">
            <div class="platforms-list" id="platforms-list"></div>
          </div>
        </div>

        <!-- 对话区域 -->

        <div id="chat-area">
          <div id="messages" class="messages">
            <div id="welcome-screen" class="welcome-screen splash">
              <div class="splash-logo-wrap">
                <div class="splash-glow"></div>
                <img src="hermes-logo.png" class="splash-logo" alt="Hermes">
              </div>
              <h1 class="splash-title">Hermes</h1>
              <div class="splash-tagline">轻于形 · 智于心</div>
              <div class="splash-line"></div>
              <div class="splash-status">选择模型 · 开始对话</div>
            </div>
          </div>
        </div>

        <!-- 输入区域 -->
        <div id="input-area">
          <div class="breath-line"></div>
          <div class="input-container">
            <!-- 排队消息 -->
            <div id="queue-area" class="queue-area hidden">
              <div class="queue-header">
                <span class="queue-label">📋 排队中</span>
                <button id="btn-queue-clear" class="btn-queue-action">清空</button>
              </div>
              <div id="queue-list" class="queue-list"></div>
              <div class="queue-footer">
                <button id="btn-queue-send" class="btn-queue-send">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
                  <span>发送排队</span>
                </button>
              </div>
            </div>
            <!-- 附件预览区（输入框外面，左侧） -->
            <div id="attachment-area" class="attachment-area hidden">
              <div id="attachment-list" class="attachment-list"></div>
            </div>
            <!-- Token 信息 -->
            <div id="token-bar" class="token-bar">
              <span class="token-item">
                <span class="token-label">上下文</span>
                <span id="token-context" class="token-value">0/--</span>
              </span>
              <span class="token-sep">·</span>
              <span class="token-item">
                <span class="token-label">已用</span>
                <span id="token-usage" class="token-value">0</span>
              </span>
              <span id="token-compress" class="token-compress"></span>
            </div>
            <!-- 输入框 -->
            <div id="input-wrapper" class="input-wrapper">
              <div class="glow-ring"></div>
              <div class="drag-hint">📎 拖放文件到这里</div>
              <button id="btn-upload" class="btn-upload" title="上传附件">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
              </button>
              <textarea id="message-input" placeholder="输入消息..." rows="1"></textarea>
              <div class="input-actions">
                <button id="btn-send" class="btn-send" title="发送消息">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                </button>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="app.js?v=6"></script>
</body>
</html>
